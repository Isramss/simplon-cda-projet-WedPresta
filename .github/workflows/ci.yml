name: CI

on:
  push:
    branches: ["main", "develop", "feature/**"]
  pull_request:

permissions:
  contents: read

jobs:
  # ─── Build Backend ───
  build_backend:
    name: Build (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint

  # ─── Test Backend ───
  test_backend:
    name: Test (backend)
    runs-on: ubuntu-latest
    needs: [build_backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run test:ci

  # ─── Build Frontend ───
  build_frontend:
    name: Build (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  # ─── Test Frontend ───
  test_frontend:
    name: Test (frontend)
    runs-on: ubuntu-latest
    needs: [build_frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run test:ci
